{% extends "base.html" %}

{% block title %}Міста{% endblock %}

{% block content %}
<h2>Список міст</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Назва міста</th>
        </tr>
    </thead>
    <tbody>
        {% for city in cities %}
        <tr>
            <td>{{ city.id }}</td>
            <td>{{ city.name }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
