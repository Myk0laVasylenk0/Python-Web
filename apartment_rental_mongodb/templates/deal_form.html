{% extends "base.html" %}

{% block title %}Створення угоди{% endblock %}

{% block content %}
<h2>Оформлення угоди</h2>

<form method="post" action="/deals/create?role={{ role }}">
    <label>Квартира:</label>
    <select name="apartment_id" required>
        {% for apartment in apartments %}
        <option value="{{ apartment.id }}">
            {{ apartment.title }} — {{ apartment.price }} грн/міс
        </option>
        {% endfor %}
    </select>

    <label>Клієнт:</label>
    <select name="client_id" required>
        {% for client in clients %}
        <option value="{{ client.id }}">
            {{ client.full_name }}
        </option>
        {% endfor %}
    </select>

    <label>Кількість місяців:</label>
    <input type="number" name="months" min="1" required>

    <button type="submit">Оформити</button>
</form>
{% endblock %}
